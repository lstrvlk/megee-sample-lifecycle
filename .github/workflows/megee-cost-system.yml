name: MEGEE Cost System CI

on:
  push:
    branches: [main, "codex/**"]
    paths:
      - "megee-cost-system/**"
      - ".github/workflows/megee-cost-system.yml"
  pull_request:
    paths:
      - "megee-cost-system/**"
      - ".github/workflows/megee-cost-system.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: megee-cost-system
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: megee-cost-system/pyproject.toml
      - name: Install
        run: pip install -e '.[dev]'
      - name: Test
        run: pytest
      - name: Lint
        run: ruff check app tests migrations
      - name: Validate migrations
        env:
          DATABASE_URL: sqlite:///./ci_migration.db
        run: alembic upgrade head

  container:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/megee-cost-system
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: megee-cost-system
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
