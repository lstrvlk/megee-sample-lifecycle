services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:////data/megee_cost.db
    volumes:
      - megee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  megee-data:
